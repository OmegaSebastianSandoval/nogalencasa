
; ==============================
; Seguridad en PHP (usuario)
; ==============================

; No mostrar versión de PHP
expose_php = Off

; Desactivar funciones peligrosas
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; Limitar errores mostrados al usuario
display_errors = Off
log_errors = On

; Forzar cookies seguras
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_only_cookies = 1

; Deshabilitar registro de PHP info (mejor quitar phpinfo.php de tu server)
engine = On

; Asegurar subida de archivos
file_uploads = On
upload_max_filesize = 10M
post_max_size = 12M
max_file_uploads = 5

; Prevenir ataques de ejecución remota
allow_url_fopen = On
allow_url_include = Off


; Prevenir buffer overflows
max_input_time = 60
max_execution_time = 30
memory_limit = 128M

